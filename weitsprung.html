<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Pixel Games - Fullscreen Long Jump</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #1a1a1a; font-family: 'Press Start 2P', cursive; }
        .ui-overlay { position: absolute; top: 20px; width: 100%; z-index: 10; pointer-events: none; text-align: center; }
        .back-btn { pointer-events: auto; font-family: 'Press Start 2P', cursive; font-size: 0.6rem; padding: 10px; border: 3px solid #fff; background: #333; color: white; }
        canvas { display: block; width: 100vw; height: 100vh; }
    </style>
</head>
<body>

    <div class="ui-overlay">
        <a href="index.html"><button class="back-btn">ZURÜCK ZUM HUB</button></a>
        <div id="status" style="color: #f1c40f; margin-top: 15px; font-size: 0.8rem;">ANLAUF & ABSPRUNG MIT LEERTASTE!</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        var canvas = document.getElementById('gameCanvas');
        var ctx = canvas.getContext('2d');
        var statusLabel = document.getElementById('status');

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        var px = 50, pspeed = 0, plastKey = "", pjump = 0, isJumping = false, pAnim = 0;
        var running = false, finished = false, cameraX = 0, jumpedAtX = 0;

        function render() {
            cameraX = px - (canvas.width * 0.3); if (cameraX < 0) cameraX = 0;
            let midH = canvas.height * 0.4;

            // STADION
            ctx.fillStyle = "#4da6ff"; ctx.fillRect(0, 0, canvas.width, midH);
            let stadiumX = -(cameraX * 0.4) % 400;
            ctx.fillStyle = "#7f8c8d"; ctx.fillRect(0, midH - 120, canvas.width, 120);
            for (let i = -1; i < (canvas.width / 400) + 2; i++) {
                let sPos = (i * 400) + stadiumX;
                for (let y = midH - 110; y < midH - 10; y += 15) {
                    for (let x = 10; x < 370; x += 20) {
                        ctx.fillStyle = ["#e74c3c","#f1c40f","#3498db","#ecf0f1"][(x+y)%4];
                        ctx.fillRect(sPos + x, y, 8, 8);
                    }
                }
            }

            // BAHN & SAND
            ctx.fillStyle = "#27ae60"; ctx.fillRect(0, midH, canvas.width, canvas.height - midH);
            let laneH = (canvas.height - midH) / 4;
            let trackY = midH + laneH * 2;
            
            ctx.fillStyle = "#c0392b"; ctx.fillRect(0 - cameraX, trackY, 1200, 80); // Anlauf
            ctx.fillStyle = "white"; ctx.fillRect(1200 - cameraX, trackY, 40, 80); // Balken
            ctx.fillStyle = "red"; ctx.fillRect(1240 - cameraX, trackY, 15, 80); // Foul-Line
            ctx.fillStyle = "#f1c40f"; ctx.fillRect(1255 - cameraX, trackY, 1000, 100); // Sand

            // LOGIK
            if (running && !finished) {
                pspeed *= 0.97; px += pspeed;
                if (!isJumping) pAnim += pspeed * 0.15;
                if (px > 2200) stopGame();
            }

            drawMan(px - cameraX, trackY + 10 + pjump, "black", pAnim);
            requestAnimationFrame(render);
        }

        function stopGame() {
            finished = true;
            if (jumpedAtX > 1240) statusLabel.innerText = "UNGÜLTIG! (ÜBERTRETEN) - 'R' FÜR RESET";
            else if (jumpedAtX === 0) statusLabel.innerText = "KEIN ABSPRUNG! - 'R' FÜR RESET";
            else {
                let dist = ((px - jumpedAtX) / 45).toFixed(2);
                statusLabel.innerText = "WEITE: " + dist + " METER! - 'R' FÜR RESET";
            }
        }

        function drawMan(x, y, color, anim) {
            let bob = isJumping ? 0 : Math.sin(anim)*5;
            let leg = isJumping ? 20 : Math.cos(anim)*15;
            ctx.strokeStyle = color; ctx.lineWidth = 6;
            ctx.beginPath(); ctx.arc(x, y-60+bob, 15, 0, 7); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(x, y-45+bob); ctx.lineTo(x, y+10+bob); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(x, y+10+bob); ctx.lineTo(x+leg, y+50); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(x, y+10+bob); ctx.lineTo(x-leg, y+50); ctx.stroke();
        }

        window.onkeydown = function(e) {
            if (e.key.toLowerCase() === "r") location.reload();
            if (finished) return;
            if (e.key === "ArrowLeft" || e.key === "ArrowRight") {
                if (e.key !== plastKey && !isJumping) {
                    running = true; pspeed += 2.4; plastKey = e.key;
                }
            }
            if (e.key === " " && !isJumping && running) {
                isJumping = true; jumpedAtX = px;
                var pow = 20;
                var t = setInterval(() => {
                    pjump -= pow; pow -= 1.2;
                    if(pjump >= 0) { pjump = 0; clearInterval(t); stopGame(); }
                }, 25);
            }
        };
        render();
    </script>
</body>
</html>
