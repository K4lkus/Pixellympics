<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Pixel Games - Summer Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body { 
            background: #2c3e50; 
            color: white; 
            text-align: center; 
            font-family: 'Press Start 2P', cursive; 
            margin: 0;
            overflow-x: hidden;
        }

        /* Stadion-Hintergrund für den Hub */
        .stadium-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: linear-gradient(180deg, #1a1a1a 0%, #2c3e50 100%);
        }

        .crowd {
            height: 150px;
            background: #7f8c8d;
            border-bottom: 8px solid #fff;
            position: relative;
            margin-top: 50px;
            opacity: 0.5;
        }

        /* Titel & Logo */
        .title-container { padding-top: 60px; margin-bottom: 40px; position: relative; }
        .title-main { font-size: 3rem; color: #ee5253; text-shadow: 6px 6px #000; }
        .title-edition { 
            display: inline-block; background: #f1c40f; color: #111; 
            font-size: 0.9rem; padding: 10px 20px; border: 4px solid #fff;
            transform: rotate(-2deg); box-shadow: 5px 5px #000;
        }

        /* Menü */
        .menu-container { display: flex; flex-direction: column; align-items: center; }
        .game-link { 
            display: block; width: 380px; background: rgba(51, 51, 51, 0.9); 
            color: white; text-decoration: none; padding: 20px; margin: 10px; 
            border: 4px solid white; box-shadow: 7px 7px 0px #000;
            transition: all 0.1s;
        }
        .game-link:hover { background: #ee5253; transform: scale(1.05); }
        .game-link span { display: block; font-size: 0.5rem; margin-top: 10px; color: #ccc; font-family: sans-serif; }
    </style>
</head>
<body>

    <div class="stadium-bg">
        <div class="crowd"></div>
    </div>

    <div class="title-container">
        <div class="title-main">PIXEL GAMES</div>
        <div class="title-edition">SUMMER EDITION</div>
    </div>
    
    <div class="menu-container">
        <a href="sprint.html" class="game-link">100M SPRINT<span>Besiege die Weltklasse-KI</span></a>
        <a href="huerden.html" class="game-link">HÜRDENLAUF<span>Timing ist der Schlüssel</span></a>
        <a href="weitsprung.html" class="game-link">WEITSPRUNG<span>Spring in den Pixelsand</span></a>
    </div>

</body>
</html>
