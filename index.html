<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Pixellympics - Hub</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body { 
            background: #1a1a1a; 
            color: white; 
            text-align: center; 
            font-family: 'Press Start 2P', cursive; 
            margin: 0;
            padding: 20px;
        }
        
        /* Das Pixel-Podest Logo */
        .logo-box {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 5px;
            margin-top: 40px;
            margin-bottom: 20px;
        }

        .podium { background: #555; border: 4px solid #fff; width: 40px; }
        .p1 { height: 60px; background: #f1c40f; } /* Gold */
        .p2 { height: 40px; background: #bdc3c7; } /* Silber */
        .p3 { height: 30px; background: #e67e22; } /* Bronze */

        .title-main { font-size: 2.5rem; color: #ee5253; text-shadow: 4px 4px #000; margin: 10px 0; }
        .title-sub { font-size: 0.8rem; color: #f1c40f; letter-spacing: 3px; margin-bottom: 40px; }

        .menu-container { display: flex; flex-direction: column; align-items: center; }
        
        .game-link { 
            display: block;
            width: 320px;
            background: #333; 
            color: white; 
            text-decoration: none; 
            padding: 20px; 
            margin: 10px; 
            border: 4px solid white;
            box-shadow: 6px 6px 0px #000;
            transition: all 0.1s;
        }
        
        .game-link:hover { 
            background: #ee5253; 
            transform: translate(-3px, -3px);
            box-shadow: 9px 9px 0px #000;
        }

        .game-link span { display: block; font-size: 0.6rem; margin-top: 10px; color: #aaa; }
    </style>
</head>
<body>

    <div class="logo-box">
        <div class="podium p2"></div>
        <div class="podium p1"></div>
        <div class="podium p3"></div>
    </div>

    <div class="title-main">PIXELLYMPICS</div>
    <div class="title-sub">VIRTUAL GAMES 2026</div>
    
    <div class="menu-container">
        <a href="sprint.html" class="game-link">
            100M SPRINT
            <span>Besiege die KI im Schnelltippen!</span>
        </a>
        <a href="huerden.html" class="game-link">
            HÜRDENLAUF
            <span>Timing ist alles - Spring rechtzeitig!</span>
        </a>
        <a href="weitsprung.html" class="game-link">
            WEITSPRUNG
            <span>Anlauf nehmen und perfekt abspringen!</span>
        </a>
    </div>

</body>
</html>
