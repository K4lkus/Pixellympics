<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Pixel Games - Summer Edition Hub</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body { 
            margin: 0; overflow: hidden; display: flex; flex-direction: column;
            align-items: center; justify-content: center; height: 100vh;
            font-family: 'Press Start 2P', cursive; color: white;
        }

        /* --- STADION HINTERGRUND --- */
        .stadium-deco {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, #4da6ff 0%, #4da6ff 40%, #27ae60 40%);
            z-index: -1;
        }

        .sun {
            position: absolute; top: 40px; right: 60px;
            width: 80px; height: 80px; background: #f1c40f;
            box-shadow: 0 0 40px #f39c12; border-radius: 50%; border: 6px solid #fff;
        }

        .crowd-line {
            position: absolute; top: 32%; left: 0; width: 100%; height: 100px;
            background: #7f8c8d; border-top: 6px solid #fff; border-bottom: 6px solid #fff;
            display: flex; flex-wrap: wrap; align-content: flex-start; overflow: hidden;
        }
        .pixel-fan { width: 10px; height: 10px; margin: 2px; }

        /* --- TITEL --- */
        .title-main { font-size: 3rem; color: #ee5253; text-shadow: 6px 6px #000; margin-bottom: 5px; }
        .title-edition { 
            background: #f1c40f; color: #111; padding: 8px 20px; 
            font-size: 0.8rem; border: 4px solid #fff; display: inline-block; 
            transform: rotate(-2deg); margin-bottom: 30px; box-shadow: 5px 5px 0px #000;
        }

        /* --- SUB-HUB LOGIK --- */
        .menu-container { 
            background: rgba(0,0,0,0.8); padding: 30px; border: 6px solid white; 
            box-shadow: 15px 15px 0px rgba(0,0,0,0.5); z-index: 10; width: 450px;
        }

        .sub-menu { display: none; } /* Standardmäßig versteckt */
        .active-menu { display: block; animation: fadeIn 0.3s; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .game-link, .category-link { 
            display: block; background: #333; color: white; 
            text-decoration: none; padding: 15px; margin: 10px 0; 
            border: 4px solid white; font-size: 0.7rem; cursor: pointer;
            transition: 0.1s; text-align: center;
        }

        .category-link { background: #555; border-color: #f1c40f; color: #f1c40f; }
        .game-link:hover, .category-link:hover { background: #ee5253; transform: scale(1.03); border-color: white; color: white; }

        .back-btn { background: #222; font-size: 0.5rem; padding: 10px; border: 2px solid #aaa; color: #aaa; cursor: pointer; margin-top: 10px; width: 100%; }

    </style>
</head>
<body>

    <div class="stadium-deco">
        <div class="sun"></div>
        <div class="crowd-line" id="crowd"></div>
    </div>

    <div class="title-main">PIXEL GAMES</div>
    <div class="title-edition">SUMMER EDITION</div>
    
    <div class="menu-container">
        <div id="main-hub" class="sub-menu active-menu">
            <div class="category-link" onclick="showSub('run-hub')">🏃 LAUF-DISZIPLINEN</div>
            <div class="category-link" onclick="showSub('jump-hub')">🚀 SPRUNG-DISZIPLINEN</div>
            <div class="category-link" onclick="showSub('throw-hub')">🎯 WURF-DISZIPLINEN</div>
        </div>

        <div id="run-hub" class="sub-menu">
            <a href="sprint.html" class="game-link">100M SPRINT</a>
            <a href="huerden.html" class="game-link">HÜRDENLAUF</a>
            <a href="lauf400m.html" class="game-link">400M (AUSDAUER)</a>
            <button class="back-btn" onclick="showSub('main-hub')">← ZURÜCK</button>
        </div>

        <div id="jump-hub" class="sub-menu">
            <a href="weitsprung.html" class="game-link">WEITSPRUNG</a>
            <a href="hochsprung.html" class="game-link">HOCHSPRUNG</a>
            <a href="stabhochsprung.html" class="game-link">STABHOCHSPRUNG</a>
            <button class="back-btn" onclick="showSub('main-hub')">← ZURÜCK</button>
        </div>

        <div id="throw-hub" class="sub-menu">
            <a href="speerwurf.html" class="game-link">SPEERWURF</a>
            <button class="back-btn" onclick="showSub('main-hub')">← ZURÜCK</button>
        </div>
    </div>

    <script>
        // Sub-Hub Steuerung
        function showSub(id) {
            document.querySelectorAll('.sub-menu').forEach(m => m.classList.remove('active-menu'));
            document.getElementById(id).classList.add('active-menu');
        }

        // Zuschauer generieren
        const crowd = document.getElementById('crowd');
        const colors = ["#e74c3c", "#f1c40f", "#3498db", "#ecf0f1"];
        for(let i=0; i<800; i++) {
            const fan = document.createElement('div');
            fan.className = 'pixel-fan';
            fan.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            crowd.appendChild(fan);
        }
    </script>
</body>
</html>
