<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Pixel Games - Hub</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body { 
            margin: 0; overflow: hidden; display: flex; flex-direction: column;
            align-items: center; justify-content: center; height: 100vh;
            font-family: 'Press Start 2P', cursive; color: white;
        }

        /* --- STADION HINTERGRUND --- */
        .stadium-deco {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, #4da6ff 0%, #4da6ff 40%, #27ae60 40%);
            z-index: -1;
        }

        /* --- SONNE --- */
        .sun {
            position: absolute;
            top: 40px; right: 60px;
            width: 80px; height: 80px;
            background: #f1c40f;
            box-shadow: 0 0 40px #f39c12;
            border-radius: 50%;
            border: 6px solid #fff;
        }

        /* --- PIXEL WOLKEN --- */
        .cloud {
            position: absolute;
            background: white;
            height: 30px; width: 100px;
            border-radius: 5px;
            opacity: 0.8;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.1);
        }
        .c1 { top: 60px; left: 10%; width: 120px; }
        .c2 { top: 120px; left: 60%; width: 150px; }
        .c3 { top: 80px; left: 80%; width: 80px; }

        /* --- TRIBÜNE --- */
        .crowd-line {
            position: absolute;
            top: 32%; left: 0; width: 100%; height: 100px;
            background: #7f8c8d; border-top: 6px solid #fff; border-bottom: 6px solid #fff;
            display: flex; flex-wrap: wrap; align-content: flex-start; overflow: hidden;
        }
        .pixel-fan { width: 10px; height: 10px; margin: 2px; }

        /* --- TITEL & MENÜ --- */
        .title-main { font-size: 3.5rem; color: #ee5253; text-shadow: 6px 6px #000; margin-bottom: 10px; z-index: 10; }
        .title-edition { 
            background: #f1c40f; color: #111; padding: 10px 25px; 
            font-size: 1rem; border: 5px solid #fff; display: inline-block; 
            transform: rotate(-2deg); margin-bottom: 50px; box-shadow: 6px 6px 0px #000; z-index: 10;
        }

        .menu-container { 
            background: rgba(0,0,0,0.7); padding: 40px; border: 6px solid white; 
            box-shadow: 15px 15px 0px rgba(0,0,0,0.5); z-index: 10;
        }
        .game-link { 
            display: block; width: 320px; background: #333; color: white; 
            text-decoration: none; padding: 18px; margin: 15px; 
            border: 4px solid white; font-size: 0.8rem; transition: all 0.1s;
        }
        .game-link:hover { background: #ee5253; transform: scale(1.1); border-color: #f1c40f; }
    </style>
</head>
<body>

    <div class="stadium-deco">
        <div class="sun"></div>
        <div class="cloud c1"></div>
        <div class="cloud c2"></div>
        <div class="cloud c3"></div>
        <div class="crowd-line" id="crowd"></div>
    </div>

    <div class="title-main">PIXEL GAMES</div>
    <div class="title-edition">SUMMER EDITION</div>
    
    <div class="menu-container">
        <a href="sprint.html" class="game-link">100M SPRINT</a>
        <a href="huerden.html" class="game-link">HÜRDENLAUF</a>
        <a href="weitsprung.html" class="game-link">WEITSPRUNG</a>
    </div>

    <script>
        const crowd = document.getElementById('crowd');
        const colors = ["#e74c3c", "#f1c40f", "#3498db", "#ecf0f1", "#9b59b6"];
        for(let i=0; i<800; i++) {
            const fan = document.createElement('div');
            fan.className = 'pixel-fan';
            fan.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            crowd.appendChild(fan);
        }
    </script>
</body>
</html>
