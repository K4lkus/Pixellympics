<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Pixel Games - Hub</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body { 
            background: #2c3e50; 
            color: white; 
            text-align: center; 
            font-family: 'Press Start 2P', cursive; 
            margin: 0; 
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        /* Stadion-Look im Hintergrund */
        .stadium-deco {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, #1a1a1a 20%, #2c3e50 50%, #27ae60 50%);
            z-index: -1;
        }

        .crowd-line {
            position: absolute;
            top: 35%; left: 0; width: 100%; height: 80px;
            background: #7f8c8d;
            border-top: 4px solid #fff;
            border-bottom: 4px solid #fff;
            display: flex;
            flex-wrap: wrap;
            overflow: hidden;
            opacity: 0.6;
        }

        .pixel-fan { width: 10px; height: 10px; margin: 2px; }

        .title-main { font-size: 3rem; color: #ee5253; text-shadow: 6px 6px #000; margin: 0; }
        .title-edition { 
            background: #f1c40f; color: #111; padding: 10px; 
            font-size: 0.8rem; border: 4px solid #fff; 
            display: inline-block; transform: rotate(-2deg); margin-bottom: 40px;
        }

        .menu-container { background: rgba(0,0,0,0.7); padding: 30px; border: 4px solid white; box-shadow: 10px 10px 0px #000; }
        .game-link { 
            display: block; width: 300px; background: #333; color: white; 
            text-decoration: none; padding: 15px; margin: 10px; 
            border: 3px solid white; font-size: 0.8rem;
        }
        .game-link:hover { background: #ee5253; transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="stadium-deco">
        <div class="crowd-line" id="crowd"></div>
    </div>

    <div class="title-main">PIXEL GAMES</div>
    <div class="title-edition">SUMMER EDITION</div>
    
    <div class="menu-container">
        <a href="sprint.html" class="game-link">100M SPRINT</a>
        <a href="huerden.html" class="game-link">HÜRDENLAUF</a>
        <a href="weitsprung.html" class="game-link">WEITSPRUNG</a>
    </div>

    <script>
        // Erzeugt bunte Pixel-Zuschauer im Hintergrund
        const crowd = document.getElementById('crowd');
        const colors = ["#e74c3c","#f1c40f","#3498db","#ecf0f1"];
        for(let i=0; i<500; i++) {
            const fan = document.createElement('div');
            fan.className = 'pixel-fan';
            fan.style.backgroundColor = colors[Math.floor(Math.random()*4)];
            crowd.appendChild(fan);
        }
    </script>
</body>
</html>
