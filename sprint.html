<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Pixel Games - 100m Sprint</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body { background: #111; color: white; text-align: center; font-family: sans-serif; margin: 0; padding: 20px; }
        canvas { background: #27ae60; border: 5px solid white; display: block; margin: 10px auto; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .back-link { color: #aaa; text-decoration: none; border: 1px solid #555; padding: 5px 10px; font-size: 0.8rem; }
        .difficulty-bits { margin: 15px; }
        button { 
            font-family: 'Press Start 2P', cursive; 
            font-size: 0.6rem; padding: 10px; margin: 5px; 
            cursor: pointer; border: 2px solid white; background: #333; color: white;
        }
        button:hover { background: #ee5253; }
        .active-diff { background: #ee5253; border-color: yellow; }
    </style>
</head>
<body>

    <h1>100m SPRINT</h1>
    
    <div class="difficulty-bits">
        <button id="btn-easy" onclick="setDiff(3.5)">LEICHT</button>
        <button id="btn-med" class="active-diff" onclick="setDiff(4.5)">MITTEL</button>
        <button id="btn-hard" onclick="setDiff(5.5)">PROFI</button>
    </div>

    <p id="status">Bereit machen...</p>
    <a href="index.html" class="back-link">Zurück zum Menü</a>

    <canvas id="sprintCanvas" width="800" height="300"></canvas>

    <script>
        var canvas, ctx, statusLabel;
        var px = 50, pspeed = 0, plastKey = "", pAnim = 0;
        var oppx = 50, oppSpeed = 4.5;
        var running = false, finished = false, startTime = 0;
        var cameraX = 0; // Der "Zoom"/Kamera-Fokus

        window.onload = function() {
            canvas = document.getElementById('sprintCanvas');
            ctx = canvas.getContext('2d');
            statusLabel = document.getElementById('status');
            render();
        };

        window.setDiff = function(speed) {
            if(running) return;
            oppSpeed = speed;
            document.querySelectorAll('button').forEach(b => b.classList.remove('active-diff'));
            event.target.classList.add('active-diff');
        };

        function render() {
            // 1. Kamera-Logik (wie gehabt)
            cameraX = px - 150;
            if (cameraX < 0) cameraX = 0;

            // --- HINTERGRUND: STADION ---
    
            // Himmel (Abenddämmerung)
            ctx.fillStyle = "#2c3e50";
            ctx.fillRect(0, 0, 800, 300);

            // Entfernte Tribünen (Parallax: cameraX * 0.5 zieht langsamer vorbei)
            let stadiumX = -(cameraX * 0.5) % 400; 
    
            for (let i = -1; i < 3; i++) {
                let startPos = (i * 400) + stadiumX;
        
                // Beton-Struktur der Tribüne
                ctx.fillStyle = "#7f8c8d";
                ctx.fillRect(startPos, 20, 380, 100);
        
                // Zuschauer-Pixel (viele kleine bunte Punkte)
                for (let y = 30; y < 100; y += 10) {
                    for (let x = 10; x < 370; x += 15) {
                        let colors = ["#e74c3c", "#f1c40f", "#3498db", "#ecf0f1"];
                        ctx.fillStyle = colors[Math.floor(Math.random() * colors.length)];
                        ctx.fillRect(startPos + x + (y % 20), y, 8, 8);
                    }
                }

                // Flutlicht-Masten
                ctx.fillStyle = "#34495e";
                ctx.fillRect(startPos + 180, 0, 20, 120);
                ctx.fillStyle = "#f1c40f"; // Licht-Pixel oben
                ctx.fillRect(startPos + 175, 0, 30, 20);
            }

            // --- VORDERGRUND: RENNBAHN ---
    
            // Rasen/Bahn (zieht mit voller Geschwindigkeit cameraX vorbei)
            ctx.fillStyle = "#27ae60";
            ctx.fillRect(0, 120, 800, 180);

            // Weiße Linien und Markierungen (relativ zu cameraX)
            ctx.strokeStyle = "white";
            ctx.lineWidth = 4;
    
            // Start/Ziel und Bahnen wie im letzten Code...
            // [Hier kommt der Rest deiner Logik: Bahnen, Ziellinie, Physik]

            // 5. Männchen zeichnen
            drawMan(px - cameraX, 230, "black", pAnim);
            drawMan(oppx - cameraX, 170, "blue", oppx * 0.1);

            window.requestAnimationFrame(render);
        }
    
        function drawMan(x, y, color, anim) {
            var bob = Math.sin(anim) * 5;
            var leg = Math.cos(anim) * 15;
            ctx.strokeStyle = color; ctx.lineWidth = 4;
            ctx.beginPath(); ctx.arc(x, y - 40 + bob, 12, 0, 7); ctx.stroke(); // Kopf
            ctx.beginPath(); ctx.moveTo(x, y - 28 + bob); ctx.lineTo(x, y + 5 + bob); ctx.stroke(); // Körper
            ctx.beginPath(); ctx.moveTo(x, y + 5 + bob); ctx.lineTo(x + leg, y + 30); ctx.stroke(); // Bein 1
            ctx.beginPath(); ctx.moveTo(x, y + 5 + bob); ctx.lineTo(x - leg, y + 30); ctx.stroke(); // Bein 2
        }

        window.onkeydown = function(e) {
            if (finished) { if(e.key === "r") location.reload(); return; }
            if (e.key === "ArrowLeft" || e.key === "ArrowRight") {
                if (e.key !== plastKey) {
                    if(!running) { running = true; startTime = Date.now(); }
                    pspeed += 2.5; plastKey = e.key;
                }
            }
        };
    </script>
</body>
</html>
