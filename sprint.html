<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Pixellympics - 100m Sprint</title>
    <style>
        body { background: #111; color: white; text-align: center; font-family: sans-serif; }
        canvas { background: orange; border: 5px solid white; display: block; margin: 20px auto; }
        .back-link { color: #aaa; text-decoration: none; border: 1px solid #555; padding: 5px 10px; }
    </style>
</head>
<body>

    <h1>100m SPRINT</h1>
    <p id="status">Hämmer die Pfeiltasten abwechselnd!</p>
    <a href="index.html" class="back-link">Zurück zum Menü</a>

    <canvas id="sprintCanvas" width="800" height="250"></canvas>

    <script>
        window.onload = function() {
            var canvas = document.getElementById('sprintCanvas');
            var ctx = canvas.getContext('2d');
            var statusLabel = document.getElementById('status');

            var px = 50, pspeed = 0, plastKey = "";
            var oppx = 50, running = false, finished = false;

            function render() {
                ctx.fillStyle = "orange";
                ctx.fillRect(0, 0, 800, 250);

                ctx.fillStyle = "white";
                ctx.fillRect(0, 125, 800, 2); // Mittellinie
                ctx.fillRect(720, 30, 20, 200); // Ziel

                if (running && !finished) {
                    pspeed *= 0.95;
                    px += pspeed;
                    oppx += 3.9; // Gegner-Geschwindigkeit

                    if (px > 710 || oppx > 710) {
                        finished = true;
                        statusLabel.innerText = (px > oppx) ? "SIEG! Gold für dich!" : "Zweiter Platz! Silber.";
                    }
                }

                // Zeichnen
                drawMan(px, 180, "black");
                drawMan(oppx, 80, "blue");
                window.requestAnimationFrame(render);
            }

            function drawMan(x, y, color) {
                ctx.strokeStyle = color; ctx.lineWidth = 4;
                ctx.beginPath(); ctx.arc(x, y, 12, 0, 7); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(x, y+12); ctx.lineTo(x, y+40); ctx.stroke();
            }

            window.onkeydown = function(e) {
                if (finished) return;
                if (e.key === "ArrowLeft" || e.key === "ArrowRight") {
                    if (e.key !== plastKey) {
                        running = true;
                        pspeed += 2.6;
                        plastKey = e.key;
                    }
                }
            };
            render();
        };
    </script>
</body>
</html>
