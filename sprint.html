<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Pixel Games - Fullscreen Sprint</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #1a1a1a; 
            font-family: 'Press Start 2P', cursive;
        }

        /* UI über das Spiel legen */
        .ui-overlay {
            position: absolute; top: 20px; width: 100%; z-index: 10;
            pointer-events: none; /* Klicks gehen durch zum Spiel */
            text-align: center;
        }

        .diff-btn, .back-btn { 
            pointer-events: auto; font-family: 'Press Start 2P', cursive; 
            font-size: 0.6rem; padding: 10px; margin: 5px; cursor: pointer; 
            border: 3px solid #fff; background: #333; color: white; 
        }
        .active { background: #ee5253; border-color: #f1c40f; }

        canvas { display: block; width: 100vw; height: 100vh; }
    </style>
</head>
<body>

    <div class="ui-overlay">
        <div>
            <button class="diff-btn" onclick="setDiff(3.5, this)">LEICHT</button>
            <button class="diff-btn active" onclick="setDiff(4.6, this)">MITTEL</button>
            <button class="diff-btn" onclick="setDiff(6.0, this)">PROFI</button>
            <a href="index.html"><button class="back-btn">HUB</button></a>
        </div>
        <div id="status" style="color: #f1c40f; margin-top: 15px; font-size: 0.8rem;">START MIT PFEILTASTEN!</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        var canvas = document.getElementById('gameCanvas');
        var ctx = canvas.getContext('2d');
        var statusLabel = document.getElementById('status');

        // Dynamische Größe
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        var px = 50, pspeed = 0, plastKey = "", pAnim = 0;
        var oppx = 50, oppSpeed = 4.6;
        var running = false, finished = false, startTime = 0, cameraX = 0;

        window.setDiff = function(s, btn) {
            if(running) return;
            oppSpeed = s;
            document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        };

        function render() {
            cameraX = px - (canvas.width * 0.2); // Spieler bleibt im linken Viertel
            if (cameraX < 0) cameraX = 0;

            let midHeight = canvas.height * 0.4; // Wo die Tribüne aufhört und die Bahn beginnt

            // 1. HIMMEL
            ctx.fillStyle = "#4da6ff";
            ctx.fillRect(0, 0, canvas.width, midHeight);

            // 2. TRIBÜNE (Parallax)
            let stadiumX = -(cameraX * 0.4) % 400;
            ctx.fillStyle = "#7f8c8d";
            ctx.fillRect(0, midHeight - 120, canvas.width, 120); // Beton-Sockel

            for (let i = -1; i < (canvas.width / 400) + 2; i++) {
                let sPos = (i * 400) + stadiumX;
                for (let y = midHeight - 110; y < midHeight - 10; y += 15) {
                    for (let x = 10; x < 380; x += 20) {
                        ctx.fillStyle = ["#e74c3c","#f1c40f","#3498db","#ecf0f1"][(x+y)%4];
                        ctx.fillRect(sPos + x, y, 8, 8);
                    }
                }
            }

            // 3. BAHN (Rasen/Tartan)
            ctx.fillStyle = "#27ae60";
            ctx.fillRect(0, midHeight, canvas.width, canvas.height - midHeight);
            
            // Bahn-Linien
            ctx.strokeStyle = "rgba(255,255,255,0.5)";
            ctx.lineWidth = 4;
            let laneHeight = (canvas.height - midHeight) / 5;
            for(let j=0; j<6; j++) {
                ctx.beginPath();
                ctx.moveTo(0, midHeight + j * laneHeight);
                ctx.lineTo(canvas.width, midHeight + j * laneHeight);
                ctx.stroke();
            }

            // Ziellinie
            ctx.fillStyle = "white";
            ctx.fillRect(2000 - cameraX, midHeight, 50, canvas.height - midHeight);

            // 4. LOGIK
            if (running && !finished) {
                pspeed *= 0.96; px += pspeed; oppx += oppSpeed;
                if (pspeed > 0.1) pAnim += pspeed * 0.12;
                let zeit = ((Date.now() - startTime)/1000).toFixed(2);
                statusLabel.innerText = "ZEIT: " + zeit + "s";
                if (px > 2000 || oppx > 2000) {
                    finished = true;
                    statusLabel.innerText = (px > oppx ? "SIEG! " : "NIEDERLAGE! ") + " 'R' FÜR RESET";
                }
            }

            // 5. ATHLETEN (Positioniert in den Bahnen)
            let playerY = midHeight + laneHeight * 3.5;
            let oppY = midHeight + laneHeight * 1.5;
            
            drawMan(px - cameraX, playerY, "black", pAnim);
            drawMan(oppx - cameraX, oppY, "blue", oppx * 0.1);

            requestAnimationFrame(render);
        }

        function drawMan(x, y, color, anim) {
            let bob = Math.sin(anim) * 5;
            let leg = Math.cos(anim) * 15;
            ctx.strokeStyle = color; ctx.lineWidth = 6;
            ctx.beginPath(); ctx.arc(x, y-60+bob, 15, 0, 7); ctx.stroke(); // Kopf größer
            ctx.beginPath(); ctx.moveTo(x, y-45+bob); ctx.lineTo(x, y+10+bob); ctx.stroke(); // Körper
            ctx.beginPath(); ctx.moveTo(x, y+10+bob); ctx.lineTo(x+leg, y+50); ctx.stroke(); // Bein 1
            ctx.beginPath(); ctx.moveTo(x, y+10+bob); ctx.lineTo(x-leg, y+50); ctx.stroke(); // Bein 2
        }

        window.onkeydown = function(e) {
            if (e.key.toLowerCase() === "r") location.reload();
            if (finished) return;
            if (e.key === "ArrowLeft" || e.key === "ArrowRight") {
                if (e.key !== plastKey) {
                    if(!running) { running = true; startTime = Date.now(); }
                    pspeed += 2.8; plastKey = e.key;
                }
            }
        };
        render();
    </script>
</body>
</html>
