<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Pixel Games - Hürdenlauf</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body { background: #111; color: white; text-align: center; font-family: sans-serif; }
        canvas { background: #d35400; border: 5px solid white; display: block; margin: 10px auto; }
        .back-link { color: #aaa; text-decoration: none; border: 1px solid #555; padding: 5px 10px; font-size: 0.8rem; }
        .difficulty-bits { margin: 15px; }
        button { 
            font-family: 'Press Start 2P', cursive; 
            font-size: 0.6rem; 
            padding: 10px; 
            margin: 5px; 
            cursor: pointer;
            border: 2px solid white;
            background: #333;
            color: white;
        }
        button:hover { background: #ee5253; }
        .active-diff { background: #ee5253; border-color: yellow; }
    </style>
</head>
<body>

    <h1>HÜRDENLAUF</h1>
    
    <div class="difficulty-bits">
        <button id="btn-easy" onclick="setDiff(3.2, 0.3)">LEICHT</button>
        <button id="btn-med" class="active-diff" onclick="setDiff(3.8, 0.15)">MITTEL</button>
        <button id="btn-hard" onclick="setDiff(4.4, 0.05)">PROFI</button>
    </div>

    <p id="status">Wähle Level & Start mit Pfeiltasten!</p>
    <a href="index.html" class="back-link">Zurück zum Menü</a>

    <canvas id="huerdenCanvas" width="800" height="250"></canvas>

    <script>
        var canvas, ctx, statusLabel;
        var px = 50, pspeed = 0, plastKey = "", pjump = 0, isJumping = false;
        var oppx = 50, oppjump = 0, oppIsJumping = false, oppSpeed = 3.8, oppFailChance = 0.15;
        var running = false, finished = false;
        var hurdles = [300, 500, 700];

        window.onload = function() {
            canvas = document.getElementById('huerdenCanvas');
            ctx = canvas.getContext('2d');
            statusLabel = document.getElementById('status');
            render();
        };

        // Schwierigkeit einstellen
        window.setDiff = function(speed, fail) {
            if(running) return; // Nicht während des Laufs ändern
            oppSpeed = speed;
            oppFailChance = fail;
            
            // Buttons optisch anpassen
            document.querySelectorAll('button').forEach(b => b.classList.remove('active-diff'));
            event.target.classList.add('active-diff');
            statusLabel.innerText = "Modus geändert! Los geht's!";
        };

        function render() {
            ctx.fillStyle = "#d35400";
            ctx.fillRect(0, 0, 800, 250);
            ctx.fillStyle = "white";
            ctx.fillRect(0, 125, 800, 2);
            ctx.fillRect(720, 30, 20, 200);

            ctx.fillStyle = "black";
            for(var i=0; i<hurdles.length; i++) {
                ctx.fillRect(hurdles[i], 190, 10, 35);
                ctx.fillRect(hurdles[i], 90, 10, 35);
            }

            if (running && !finished) {
                pspeed *= 0.95;
                px += pspeed;
                oppx += oppSpeed;

                // Spieler Kollision
                for(var j=0; j<hurdles.length; j++) {
                    if(px > hurdles[j]-15 && px < hurdles[j]+5 && pjump > -25) {
                        pspeed = 0; 
                    }
                }

                // Gegner KI mit Fehler-Chance
                for(var k=0; k<hurdles.length; k++) {
                    if(oppx > hurdles[k]-45 && oppx < hurdles[k]-35 && !oppIsJumping) {
                        // Der Gegner entscheidet hier, ob er springt oder patzt
                        if(Math.random() > oppFailChance) {
                            oppJumpAction();
                        } else {
                            // Er patzt! Er wird kurz sehr langsam
                            oppSpeed = 0.5; 
                            setTimeout(() => { if(!finished) oppSpeed = 3.2; }, 800);
                        }
                    }
                }

                if (px > 710 || oppx > 710) {
                    finished = true;
                    statusLabel.innerText = (px > oppx) ? "SIEG!" : "NIEDERLAGE!";
                }
            }

            drawMan(px, 180 + pjump, "black");
            drawMan(oppx, 80 + oppjump, "blue");
            window.requestAnimationFrame(render);
        }

        function oppJumpAction() {
            oppIsJumping = true;
            var power = 15;
            var timer = setInterval(function() {
                oppjump -= power; power -= 1;
                if (oppjump >= 0) { oppjump = 0; oppIsJumping = false; clearInterval(timer); }
            }, 22);
        }

        function drawMan(x, y, color) {
            ctx.strokeStyle = color; ctx.lineWidth = 4;
            ctx.beginPath(); ctx.arc(x, y, 12, 0, 7); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(x, y+12); ctx.lineTo(x, y+40); ctx.stroke();
        }

        window.onkeydown = function(e) {
            if (finished) { 
                if(e.key === "r") location.reload(); 
                return; 
            }
            if (e.key === "ArrowLeft" || e.key === "ArrowRight") {
                if (e.key !== plastKey) {
                    running = true; pspeed += 2.4; plastKey = e.key;
                    statusLabel.innerText = "LAUF!!!";
                }
            }
            if (e.key === " " && !isJumping) {
                isJumping = true;
                var power = 15;
                var timer = setInterval(function() {
                    pjump -= power; power -= 1;
                    if (pjump >= 0) { pjump = 0; isJumping = false; clearInterval(timer); }
                }, 20);
            }
        };
    </script>
</body>
</html>
