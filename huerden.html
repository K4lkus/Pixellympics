<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Pixel Games - Summer Edition</title>
    <style>
        /* Importiert die Gamer-Schriftart */
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body { 
            background: #1a1a1a; /* Sehr dunkles Grau */
            color: white; 
            text-align: center; 
            font-family: 'Press Start 2P', cursive; 
            margin: 0;
            padding: 20px;
            /* Ein leichter Sonnenaufgangs-Effekt im Hintergrund */
            background-image: linear-gradient(180deg, #1a1a1a 0%, #2c3e50 100%);
            min-height: 100vh;
        }
        
        /* Das Pixel-Podest Logo */
        .logo-box {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 7px;
            margin-top: 50px;
            margin-bottom: 25px;
        }

        .podium { background: #555; border: 4px solid #fff; width: 45px; box-shadow: 4px 4px 0px #000; }
        .p1 { height: 70px; background: #f1c40f; } /* Gold */
        .p2 { height: 50px; background: #bdc3c7; } /* Silber */
        .p3 { height: 35px; background: #e67e22; } /* Bronze */

        /* Haupttitel */
        .title-container { margin-bottom: 50px; }
        .title-top { font-size: 1.2rem; color: white; letter-spacing: 2px; margin-bottom: 10px; }
        .title-main { font-size: 3rem; color: #ee5253; text-shadow: 6px 6px #000; margin: 15px 0; }
        
        /* Der "Edition"-Balken */
        .title-edition { 
            display: inline-block;
            background: #f1c40f; /* Sommerliches Gelb */
            color: #111; 
            font-size: 0.9rem; 
            padding: 10px 20px; 
            border: 4px solid #fff;
            margin-top: 10px;
            transform: rotate(-2deg); /* Ein leichter Retro-Knick */
            box-shadow: 5px 5px 0px #000;
        }

        /* Menü-Links */
        .menu-container { display: flex; flex-direction: column; align-items: center; }
        
        .game-link { 
            display: block;
            width: 350px;
            background: #333; 
            color: white; 
            text-decoration: none; 
            padding: 25px; 
            margin: 12px; 
            border: 4px solid white;
            box-shadow: 7px 7px 0px #000;
            transition: all 0.1s ease-in-out;
            position: relative;
        }
        
        /* Effekt beim Drüberfahren */
        .game-link:hover { 
            background: #ee5253; /* Rot beim Hover */
            transform: translate(-4px, -4px);
            box-shadow: 11px 11px 0px #000;
        }

        /* Beschreibungstext unter den Links */
        .game-link span { 
            display: block; 
            font-size: 0.6rem; 
            margin-top: 12px; 
            color: #aaa; 
            font-family: sans-serif; /* Einfachere Schrift für den Text */
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="logo-box">
        <div class="podium p2"></div>
        <div class="podium p1"></div>
        <div class="podium p3"></div>
    </div>

    <div class="title-container">
        <div class="title-main">PIXEL GAMES</div>
        <div class="title-edition">SUMMER EDITION</div>
    </div>
    
    <div class="menu-container">
        <a href="sprint.html" class="game-link">
            100M SPRINT
            <span>Abwechselnd Pfeiltasten hämmern! Besiege die KI.</span>
        </a>
        <a href="huerden.html" class="game-link">
            HÜRDENLAUF
            <span>Rennen & rechtzeitig Leertaste zum Springen drücken.</span>
        </a>
        <a href="weitsprung.html" class="game-link">
            WEITSPRUNG
            <span>Nimm Anlauf und spring vor der roten Linie ab!</span>
        </a>
    </div>

</body>
</html>
