<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Pixel Games - Hürdenlauf</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body { background: #1a1a1a; color: white; text-align: center; font-family: 'Press Start 2P', cursive; margin: 0; padding: 20px; overflow: hidden; }
        canvas { background: #c0392b; border: 6px solid #fff; display: block; margin: 10px auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .ui-top { margin-bottom: 10px; }
        .diff-btn { font-family: 'Press Start 2P', cursive; font-size: 0.7rem; padding: 10px; margin: 5px; cursor: pointer; border: 3px solid #fff; background: #333; color: white; }
        .diff-btn:hover { background: #ee5253; }
        .active { background: #ee5253; border-color: #f1c40f; }
        .status { font-size: 0.8rem; color: #f1c40f; margin: 10px; height: 1rem; }
        .back { color: #aaa; text-decoration: none; font-family: sans-serif; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="ui-top">
        <button class="diff-btn" onclick="setDiff(3.2, 0.3, this)">LEICHT</button>
        <button class="diff-btn active" onclick="setDiff(3.9, 0.15, this)">MITTEL</button>
        <button class="diff-btn" onclick="setDiff(4.6, 0.05, this)">PROFI</button>
    </div>

    <div id="status" class="status">LOKALER HÜRDEN-CUP 2026</div>

    <canvas id="huerdenCanvas" width="800" height="350"></canvas>
    <a href="index.html" class="back">← ZURÜCK ZUM HUB</a>

    <script>
        var canvas, ctx, statusLabel;
        var px = 50, pspeed = 0, plastKey = "", pjump = 0, isJumping = false, pAnim = 0;
        var oppx = 50, oppSpeed = 3.9, oppFail = 0.15, oppJump = 0, oppIsJumping = false;
        var running = false, finished = false, startTime = 0, cameraX = 0;
        var hurdles = [400, 700, 1000, 1300];

        window.onload = function() {
            canvas = document.getElementById('huerdenCanvas');
            ctx = canvas.getContext('2d');
            statusLabel = document.getElementById('status');
            render();
        };

        window.setDiff = function(s, f, btn) {
            if(running) return;
            oppSpeed = s; oppFail = f;
            document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        };

        function render() {
            cameraX = px - 150; if (cameraX < 0) cameraX = 0;

            // STADION
            ctx.fillStyle = "#2c3e50"; ctx.fillRect(0, 0, 800, 350);
            let stadiumX = -(cameraX * 0.4) % 400;
            for (let i = -1; i < 4; i++) {
                let sPos = (i * 400) + stadiumX;
                ctx.fillStyle = "#7f8c8d"; ctx.fillRect(sPos, 40, 380, 110);
                for (let y = 50; y < 140; y += 12) {
                    for (let x = 10; x < 370; x += 18) {
                        ctx.fillStyle = ["#e74c3c","#f1c40f","#3498db","#ecf0f1"][Math.floor(Math.random()*4)];
                        ctx.fillRect(sPos + x + (y%15), y, 7, 7);
                    }
                }
            }

            // TARTANBAHN
            ctx.fillStyle = "#c0392b"; ctx.fillRect(0, 150, 800, 200);
            ctx.strokeStyle = "white"; ctx.lineWidth = 4;
            for(let j=0; j<4; j++) {
                ctx.beginPath(); ctx.moveTo(0, 150 + j*60); ctx.lineTo(800, 150 + j*60); ctx.stroke();
            }

            // Hürden & Ziel
            hurdles.forEach(hx => {
                ctx.fillStyle = "black";
                ctx.fillRect(hx - cameraX, 260, 10, 40); // Spieler
                ctx.fillRect(hx - cameraX, 200, 10, 40); // Gegner
            });
            ctx.fillStyle = "white"; ctx.fillRect(1600 - cameraX, 150, 40, 200);

            // Logik
            if (running && !finished) {
                pspeed *= 0.95; px += pspeed; oppx += oppSpeed;
                if (pspeed > 0.1) pAnim += pspeed * 0.12;

                // Spieler Kollision
                hurdles.forEach(hx => {
                    if(px > hx-20 && px < hx+5 && pjump > -30) pspeed = 0;
                });

                // Gegner KI
                hurdles.forEach(hx => {
                    if(oppx > hx-50 && oppx < hx-40 && !oppIsJumping) {
                        if(Math.random() > oppFail) oppJumpAction();
                        else { oppx -= 5; } // Kleiner Stolperer
                    }
                });

                if (px > 1600 || oppx > 1600) {
                    finished = true;
                    statusLabel.innerText = px > oppx ? "GOLD! R FÜR RESET" : "SILBER! R FÜR RESET";
                }
            }

            drawMan(px - cameraX, 280 + pjump, "black", pAnim);
            drawMan(oppx - cameraX, 210 + oppJump, "blue", oppx * 0.1);
            window.requestAnimationFrame(render);
        }

        function oppJumpAction() {
            oppIsJumping = true; var pow = 16;
            var t = setInterval(() => {
                oppJump -= pow; pow -= 1;
                if(oppJump >= 0) { oppJump = 0; oppIsJumping = false; clearInterval(t); }
            }, 22);
        }

        function drawMan(x, y, color, anim) {
            var bob = Math.sin(anim)*5; var leg = Math.cos(anim)*15;
            ctx.strokeStyle = color; ctx.lineWidth = 5;
            ctx.beginPath(); ctx.arc(x, y-45+bob, 12, 0, 7); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(x, y-33+bob); ctx.lineTo(x, y+5+bob); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(x, y+5+bob); ctx.lineTo(x+leg, y+35); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(x, y+5+bob); ctx.lineTo(x-leg, y+35); ctx.stroke();
        }

        window.onkeydown = function(e) {
            if (e.key.toLowerCase() === "r") location.reload();
            if (finished) return;
            if (e.key === "ArrowLeft" || e.key === "ArrowRight") {
                if (e.key !== plastKey) {
                    if(!running) { running = true; startTime = Date.now(); }
                    pspeed += 2.5; plastKey = e.key;
                }
            }
            if (e.key === " " && !isJumping) {
                isJumping = true; var pow = 16;
                var t = setInterval(() => {
                    pjump -= pow; pow -= 1;
                    if(pjump >= 0) { pjump = 0; isJumping = false; clearInterval(t); }
                }, 20);
            }
        };
    </script>
</body>
</html>
