<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Pixel Games - Fullscreen Hurdles</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #1a1a1a; font-family: 'Press Start 2P', cursive; }
        .ui-overlay { position: absolute; top: 20px; width: 100%; z-index: 10; pointer-events: none; text-align: center; }
        .diff-btn, .back-btn { pointer-events: auto; font-family: 'Press Start 2P', cursive; font-size: 0.6rem; padding: 10px; margin: 5px; cursor: pointer; border: 3px solid #fff; background: #333; color: white; }
        .active { background: #ee5253; border-color: #f1c40f; }
        canvas { display: block; width: 100vw; height: 100vh; }
    </style>
</head>
<body>

    <div class="ui-overlay">
        <div>
            <button class="diff-btn" onclick="setDiff(3.2, 0.3, this)">LEICHT</button>
            <button class="diff-btn active" onclick="setDiff(3.9, 0.15, this)">MITTEL</button>
            <button class="diff-btn" onclick="setDiff(4.8, 0.05, this)">PROFI</button>
            <a href="index.html"><button class="back-btn">HUB</button></a>
        </div>
        <div id="status" style="color: #f1c40f; margin-top: 15px; font-size: 0.8rem;">SPRING MIT LEERTASTE!</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        var canvas = document.getElementById('gameCanvas');
        var ctx = canvas.getContext('2d');
        var statusLabel = document.getElementById('status');

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        var px = 50, pspeed = 0, plastKey = "", pjump = 0, isJumping = false, pAnim = 0;
        var oppx = 50, oppSpeed = 3.9, oppFail = 0.15, oppJump = 0, oppIsJumping = false;
        var running = false, finished = false, cameraX = 0;
        var hurdles = [450, 850, 1250, 1650];

        window.setDiff = function(s, f, btn) {
            if(running) return;
            oppSpeed = s; oppFail = f;
            document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        };

        function render() {
            cameraX = px - (canvas.width * 0.2); if (cameraX < 0) cameraX = 0;
            let midH = canvas.height * 0.4;

            // HIMMEL & SONNE
            ctx.fillStyle = "#4da6ff"; ctx.fillRect(0, 0, canvas.width, midH);
            ctx.fillStyle = "#f1c40f"; ctx.beginPath(); ctx.arc(canvas.width-80, 60, 40, 0, 7); ctx.fill();

            // TRIBÜNE (Parallax)
            let stadiumX = -(cameraX * 0.4) % 400;
            ctx.fillStyle = "#7f8c8d"; ctx.fillRect(0, midH - 120, canvas.width, 120);
            for (let i = -1; i < (canvas.width / 400) + 2; i++) {
                let sPos = (i * 400) + stadiumX;
                for (let y = midH - 110; y < midH - 10; y += 15) {
                    for (let x = 10; x < 380; x += 20) {
                        ctx.fillStyle = ["#e74c3c","#f1c40f","#3498db","#ecf0f1"][(x+y)%4];
                        ctx.fillRect(sPos + x, y, 8, 8);
                    }
                }
            }

            // BAHN (Tartan)
            ctx.fillStyle = "#c0392b"; ctx.fillRect(0, midH, canvas.width, canvas.height - midH);
            let laneH = (canvas.height - midH) / 5;
            ctx.strokeStyle = "rgba(255,255,255,0.4)"; ctx.lineWidth = 4;
            for(let j=0; j<6; j++) {
                ctx.beginPath(); ctx.moveTo(0, midH + j * laneH); ctx.lineTo(canvas.width, midH + j * laneH); ctx.stroke();
            }

            // HÜRDEN & ZIEL
            hurdles.forEach(hx => {
                ctx.fillStyle = "black";
                ctx.fillRect(hx - cameraX, midH + laneH*3.2, 15, laneH*0.8); // Spieler Hürde
                ctx.fillRect(hx - cameraX, midH + laneH*1.2, 15, laneH*0.8); // Gegner Hürde
            });
            ctx.fillStyle = "white"; ctx.fillRect(2000 - cameraX, midH, 50, canvas.height - midH);

            // LOGIK
            if (running && !finished) {
                pspeed *= 0.95; px += pspeed; oppx += oppSpeed;
                if (pspeed > 0.1 && !isJumping) pAnim += pspeed * 0.12;
                hurdles.forEach(hx => {
                    if(px > hx-25 && px < hx+5 && pjump > -40) pspeed = 0;
                });
                hurdles.forEach(hx => {
                    if(oppx > hx-60 && oppx < hx-50 && !oppIsJumping) {
                        if(Math.random() > oppFail) oppJumpAction();
                        else { oppx -= 5; } 
                    }
                });
                if (px > 2000 || oppx > 2000) {
                    finished = true;
                    statusLabel.innerText = (px > oppx ? "GOLD! " : "SILBER! ") + " 'R' FÜR RESET";
                }
            }

            drawMan(px - cameraX, midH + laneH*3.5 + pjump, "black", pAnim);
            drawMan(oppx - cameraX, midH + laneH*1.5 + oppJump, "blue", oppx * 0.1);
            requestAnimationFrame(render);
        }

        function oppJumpAction() {
            oppIsJumping = true; var pow = 18;
            var t = setInterval(() => {
                oppJump -= pow; pow -= 1.2;
                if(oppJump >= 0) { oppJump = 0; oppIsJumping = false; clearInterval(t); }
            }, 25);
        }

        function drawMan(x, y, color, anim) {
            let bob = Math.sin(anim) * 5; let leg = Math.cos(anim) * 15;
            ctx.strokeStyle = color; ctx.lineWidth = 6;
            ctx.beginPath(); ctx.arc(x, y-60+bob, 15, 0, 7); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(x, y-45+bob); ctx.lineTo(x, y+10+bob); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(x, y+10+bob); ctx.lineTo(x+leg, y+50); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(x, y+10+bob); ctx.lineTo(x-leg, y+50); ctx.stroke();
        }

        window.onkeydown = function(e) {
            if (e.key.toLowerCase() === "r") location.reload();
            if (finished) return;
            if (e.key === "ArrowLeft" || e.key === "ArrowRight") {
                if (e.key !== plastKey) {
                    if(!running) { running = true; }
                    pspeed += 2.6; plastKey = e.key;
                }
            }
            if (e.key === " " && !isJumping) {
                isJumping = true; var pow = 18;
                var t = setInterval(() => {
                    pjump -= pow; pow -= 1.2;
                    if(pjump >= 0) { pjump = 0; isJumping = false; clearInterval(t); }
                }, 25);
            }
        };
        render();
    </script>
</body>
</html>
